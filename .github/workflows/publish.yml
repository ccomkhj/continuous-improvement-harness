name: Publish

# Publishes to PyPI when a version tag (e.g. v0.1.1) is pushed.
# Cut a release with:  git tag v0.1.1 && git push origin v0.1.1
# (the tag must match cih.__version__, or the build fails fast).
on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    environment:
      name: pypi
      url: https://pypi.org/project/cih-agent/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c 'import cih; print(cih.__version__)')"
          echo "tag=$TAG  package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match cih.__version__ ($PKG). Bump cih/__init__.py first."
            exit 1
          fi

      - run: python -m build
      - run: python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
